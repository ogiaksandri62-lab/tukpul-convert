<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukpul Convert - Transaksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --bg-body: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: #1e293b; padding-bottom: 50px; }

        .hero-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            height: 200px;
            padding: 30px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .container { max-width: 450px; margin: -60px auto 20px; padding: 0 20px; }
        
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .section-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 15px; }

        /* Provider Grid dengan Logo */
        .provider-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        
        .provider-btn {
            background: white; 
            border: 2px solid #f1f5f9; 
            border-radius: 20px; 
            padding: 15px;
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .provider-btn img {
            width: 50px;
            height: 30px;
            object-fit: contain;
        }

        .provider-btn span {
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
        }

        .provider-btn.active { 
            border-color: var(--primary); 
            background: #eff6ff; 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.1);
        }

        .provider-btn.active span { color: var(--primary); }

        /* Form & Input */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--secondary); margin-bottom: 6px; }
        
        input, select {
            width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0;
            background: #fff; font-size: 1rem; font-weight: 600; outline: none;
        }

        .result-panel {
            background: #f1f5f9; border-radius: 15px; padding: 15px; text-align: center; margin: 15px 0;
            border: 1px dashed #cbd5e1;
        }
        .result-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); }

        .btn-main {
            width: 100%; background: var(--primary); color: white; border: none; padding: 18px;
            border-radius: 15px; font-weight: 700; font-size: 1rem; cursor: pointer;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="hero-bg">
        <h1 style="font-size: 1.4rem;">Tukpul Convert</h1>
        <p style="font-size: 0.8rem; opacity: 0.8;">Tukar pulsa jadi saldo instan</p>
    </div>

    <div class="container">
        <div id="page1" class="glass-card">
            <h2 class="section-title">1. Pilih Provider</h2>
            <div class="provider-grid">
                <div class="provider-btn active" data-rate="0.87">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Telkomsel_2021_icon.svg" alt="Telkomsel">
                    <span>Telkomsel</span>
                </div>
                <div class="provider-btn" data-rate="0.89">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/Indosat_Ooredoo_Hutchison_logo.svg" alt="Indosat">
                    <span>Indosat</span>
                </div>
                <div class="provider-btn" data-rate="0.90">
                    <img src="https://upload.wikimedia.org/wikipedia/en/5/55/XL_Axiata_logo_2016.svg" alt="XL">
                    <span>XL Axiata</span>
                </div>
                <div class="provider-btn" data-rate="0.85">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/Three_Logo.svg" alt="Three">
                    <span>Three (3)</span>
                </div>
            </div>

            <div class="form-group">
                <label>Nominal Pulsa</label>
                <input type="number" id="inputNominal" placeholder="Contoh: 100000">
            </div>

            <div class="result-panel">
                <p style="font-size: 0.7rem; font-weight: 700; color: var(--secondary);">SALDO DITERIMA</p>
                <p class="result-value" id="tampilSaldo">Rp 0</p>
            </div>

            <button class="btn-main" onclick="nextPage()">Lanjut Isi Data Cair ➔</button>
        </div>

        <div id="page2" class="glass-card hidden">
            <h2 class="section-title">2. Tujuan Pencairan Saldo</h2>
            <div class="form-group">
                <label>Pilih Bank / E-Wallet</label>
                <select id="metodeCair">
                    <option value="DANA">DANA</option>
                    <option value="OVO">OVO</option>
                    <option value="GOPAY">GOPAY</option>
                    <option value="SHOPEEPAY">SHOPEEPAY</option>
                    <option value="BCA">BANK BCA</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nomor Rekening / HP</label>
                <input type="tel" id="nomorTujuan" placeholder="Contoh: 0812xxx">
            </div>
            <div class="form-group">
                <label>Nama Pemilik Rekening</label>
                <input type="text" id="namaTujuan" placeholder="Nama sesuai akun">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: #e2e8f0; color: #475569;" onclick="prevPage()">Kembali</button>
                <button class="btn-main" onclick="prosesWhatsApp()">Konfirmasi 🚀</button>
            </div>
        </div>
    </div>

    <script>
        let currentRate = 0.87;
        const inputNominal = document.getElementById('inputNominal');
        const tampilSaldo = document.getElementById('tampilSaldo');
        const providerBtns = document.querySelectorAll('.provider-btn');

        function hitungSaldo() {
            const nominal = inputNominal.value || 0;
            const hasil = Math.floor(nominal * currentRate);
            tampilSaldo.innerText = "Rp " + hasil.toLocaleString('id-ID');
        }

        providerBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                providerBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRate = parseFloat(btn.getAttribute('data-rate'));
                hitungSaldo();
            });
        });

        inputNominal.addEventListener('input', hitungSaldo);

        function nextPage() {
            if(inputNominal.value < 30000) { alert("Minimal convert 30.000"); return; }
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        }

        function prevPage() {
            document.getElementById('page2').classList.add('hidden');
            document.getElementById('page1').classList.remove('hidden');
        }

        function prosesWhatsApp() {
            const nominal = inputNominal.value;
            const saldo = tampilSaldo.innerText;
            const metode = document.getElementById('metodeCair').value;
            const nomor = document.getElementById('nomorTujuan').value;
            const nama = document.getElementById('namaTujuan').value;

            if(!nomor || !nama) { alert("Data belum lengkap!"); return; }

            const pesan = `Halo Tukpul Convert!%0A%0ASaya ingin convert:%0A- Provider: ${document.querySelector('.provider-btn.active span').innerText}%0A- Nominal: ${nominal}%0A- Terima Saldo: ${saldo}%0A%0ATujuan:%0A- Metode: ${metode}%0A- Nomor: ${nomor}%0A- Nama: ${nama}`;
            
            window.location.href = `https://wa.me/628XXXXXXXXXX?text=${pesan}`; 
        }
    </script>
</body>
</html>
