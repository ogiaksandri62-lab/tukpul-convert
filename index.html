<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukpul Convert - Transaksi Cepat & Aman</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --bg-body: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
            --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: #1e293b; padding-bottom: 80px; }

        .hero-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            height: 220px;
            padding: 30px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .container { max-width: 450px; margin: -80px auto 20px; padding: 0 20px; }
        
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        .section-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        .provider-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .provider-btn {
            background: white; border: 2px solid #f1f5f9; border-radius: 20px; padding: 12px;
            text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .provider-btn img { width: 40px; height: 25px; object-fit: contain; }
        .provider-btn span { font-size: 0.7rem; font-weight: 700; color: #475569; }
        .provider-btn.active { border-color: var(--primary); background: #eff6ff; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--secondary); margin-bottom: 6px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-weight: 600; outline: none; }

        .result-panel { background: #f1f5f9; border-radius: 15px; padding: 15px; text-align: center; margin: 15px 0; border: 1px dashed #cbd5e1; }
        .result-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); }

        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 700; font-size: 1rem; cursor: pointer; }

        .testi-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .testi-user { font-weight: 700; font-size: 0.85rem; color: var(--primary); margin-bottom: 5px; display: block; }
        .testi-text { font-size: 0.8rem; color: var(--secondary); font-style: italic; }

        .wa-float {
            position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px;
            background-color: var(--whatsapp); color: #FFF; border-radius: 50px;
            text-align: center; font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 1000; display: flex; align-items: center; justify-content: center; text-decoration: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="hero-bg">
        <h1 style="font-size: 1.4rem;">Tukpul Convert</h1>
        <p style="font-size: 0.8rem; opacity: 0.8;">Tukar pulsa jadi saldo instan & terpercaya</p>
    </div>

    <div class="container">
        <div id="page1" class="glass-card">
            <h2 class="section-title">1. Hitung Rate</h2>
            <div class="provider-grid">
                <div class="provider-btn active" data-rate="0.87">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Telkomsel_2021_icon.svg">
                    <span>Telkomsel</span>
                </div>
                <div class="provider-btn" data-rate="0.89">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/Indosat_Ooredoo_Hutchison_logo.svg">
                    <span>Indosat</span>
                </div>
                <div class="provider-btn" data-rate="0.90">
                    <img src="https://upload.wikimedia.org/wikipedia/en/5/55/XL_Axiata_logo_2016.svg">
                    <span>XL Axiata</span>
                </div>
                <div class="provider-btn" data-rate="0.85">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/Three_Logo.svg">
                    <span>Three (3)</span>
                </div>
            </div>

            <div class="form-group">
                <label>Nominal Pulsa</label>
                <input type="number" id="inputNominal" placeholder="Contoh: 100000">
            </div>

            <div class="result-panel">
                <p style="font-size: 0.7rem; font-weight: 700;">ESTIMASI SALDO</p>
                <p class="result-value" id="tampilSaldo">Rp 0</p>
            </div>

            <button class="btn-main" onclick="nextPage()">Isi Data Pencairan ➔</button>
        </div>

        <div id="page2" class="glass-card hidden">
            <h2 class="section-title">2. Tujuan Pencairan</h2>
            <div class="form-group">
                <label>Pilih Bank / E-Wallet</label>
                <select id="metodeCair">
                    <option value="DANA">DANA</option>
                    <option value="OVO">OVO</option>
                    <option value="GOPAY">GOPAY</option>
                    <option value="BCA">BANK BCA</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nomor Tujuan</label>
                <input type="tel" id="nomorTujuan" placeholder="08xxxxxxx">
            </div>
            <div class="form-group">
                <label>Atas Nama</label>
                <input type="text" id="namaTujuan" placeholder="Nama Akun">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: #e2e8f0; color: #475569;" onclick="prevPage()">Kembali</button>
                <button class="btn-main" onclick="prosesWhatsApp()">Tukar Sekarang 🚀</button>
            </div>
        </div>

        <h2 class="section-title" style="margin-top: 30px;">Testimoni Pelanggan</h2>
        <div class="testi-card">
            <span class="testi-user">@Andi_Pratama</span>
            <p class="testi-text">"Gokil! Tukar pulsa di sini gak sampe 5 menit langsung masuk. Rate-nya tinggi!"</p>
        </div>
    </div>

    <a href="https://wa.me/6289530922938" class="wa-float" target="_blank">
        <svg style="width:30px;height:30px" viewBox="0 0 24 24"><path fill="currentColor" d="M12.04 2C6.5 2 2 6.5 2 12.04C2 13.81 2.46 15.47 3.26 16.93L2 21.5L6.75 20.27C8.15 21.05 9.76 21.5 11.43 21.5C11.43 21.5 11.44 21.5 11.44 21.5C16.97 21.5 21.48 17 21.48 11.45C21.48 8.76 20.43 6.25 18.52 4.35C16.62 2.45 14.11 2 12.04 2M12.04 3.7C14.15 3.7 16.12 4.5 17.61 6C19.1 7.47 19.92 9.45 19.92 11.56C19.92 15.96 16.33 19.53 11.95 19.53C10.55 19.53 9.22 19.17 8.05 18.5L7.77 18.34L4.97 19.08L5.73 16.36L5.55 16.08C4.81 14.91 4.42 13.56 4.42 12.16C4.42 7.8 7.85 4.35 12.04 4.35C12.04 4.35 12.04 3.7 12.04 3.7M8.61 8.21C8.4 8.21 8.06 8.29 7.78 8.6C7.5 8.91 6.72 9.69 6.72 11.28C6.72 12.87 7.87 14.4 8.03 14.61C8.19 14.82 10.24 18.12 13.47 19.41C16.16 20.47 16.71 20.25 17.29 20.2C17.87 20.15 19.16 19.43 19.43 18.66C19.7 17.89 19.7 17.22 19.62 17.08C19.53 16.94 19.32 16.86 19 16.71C18.68 16.56 17.14 15.79 16.85 15.69C16.56 15.58 16.35 15.53 16.14 15.84C15.92 16.15 15.31 16.86 15.13 17.07C14.94 17.27 14.76 17.3 14.44 17.15C14.12 17 13.1 16.65 11.88 15.56C10.93 14.72 10.29 13.68 10.1 13.36C9.92 13.04 10.09 12.87 10.24 12.72C10.38 12.58 10.56 12.35 10.72 12.15C10.88 11.95 10.93 11.81 11.04 11.6C11.14 11.39 11.09 11.2 11 11.05C10.95 10.9 10.24 9.15 9.94 8.44C9.65 7.75 9.35 7.85 9.13 7.85C8.92 7.85 8.61 7.85 8.61 7.85" /></svg>
    </a>

    <script>
        let currentRate = 0.87;
        const inputNominal = document.getElementById('inputNominal');
        const tampilSaldo = document.getElementById('tampilSaldo');
        const providerBtns = document.querySelectorAll('.provider-btn');

        function hitungSaldo() {
            const nominal = inputNominal.value || 0;
            const hasil = Math.floor(nominal * currentRate);
            tampilSaldo.innerText = "Rp " + hasil.toLocaleString('id-ID');
        }

        providerBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                providerBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRate = parseFloat(btn.getAttribute('data-rate'));
                hitungSaldo();
            });
        });

        inputNominal.addEventListener('input', hitungSaldo);

        function nextPage() {
            if(inputNominal.value < 30000) { alert("Minimal 30.000"); return; }
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        }

        function prevPage() {
            document.getElementById('page2').classList.add('hidden');
            document.getElementById('page1').classList.remove('hidden');
        }

        function prosesWhatsApp() {
            const nominal = inputNominal.value;
            const saldo = tampilSaldo.innerText;
            const metode = document.getElementById('metodeCair').value;
            const nomor = document.getElementById('nomorTujuan').value;
            const nama = document.getElementById('namaTujuan').value;
            const provider = document.querySelector('.provider-btn.active span').innerText;

            const pesan = `Halo Tukpul Convert!%0A%0ASaya mau tukar pulsa:%0A- Provider: ${provider}%0A- Nominal: ${nominal}%0A- Terima Saldo: ${saldo}%0A%0ATujuan Pencairan:%0A- Metode: ${metode}%0A- No/Rek: ${nomor}%0A- a.n ${nama}`;
            
            // MENGGUNAKAN NOMOR ANDA: 089530922938
            window.location.href = `https://wa.me/6289530922938?text=${pesan}`;
        }
    </script>
</body>
</html>
